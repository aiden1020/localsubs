version: 2

builds:
  - id: localsubs
    main: ./cmd/localsubs
    binary: localsubs
    goos: [darwin]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w
      - -X localsubs/internal/runtime.HelperVersion={{.Version}}

archives:
  - id: localsubs
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

release:
  github:
    owner: aiden1020
    name: localsubs
  name_template: "v{{.Version}}"

brews:
  - name: localsubs
    repository:
      owner: aiden1020
      name: homebrew-localsubs
    homepage: https://github.com/aiden1020/localsubs
    description: "Local AI subtitle translation helper for streaming video"
    dependencies:
      - name: llama.cpp
    install: |
      bin.install "localsubs"
    caveats: |
      Get started:
        localsubs model download   # download translation model (~350 MB)
        localsubs install           # connect to Chrome
    test: |
      assert_match "localsubs", shell_output("#{bin}/localsubs version")
